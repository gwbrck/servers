---
- name: Ensure required packages are installed
  ansible.builtin.package:
    name:
      - vdirsyncer
    state: present

- name: Ensure vdirsyncer system user exists
  ansible.builtin.user:
    name: vdirsyncer
    system: true
    shell: /usr/sbin/nologin
    create_home: true
    home: /var/lib/vdirsyncer

- name: Ensure vdirsyncer directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: vdirsyncer
    group: vdirsyncer
    mode: "0700"
  loop:
    - /var/lib/vdirsyncer/.vdirsyncer
    - /var/lib/vdirsyncer/.vdirsyncer/status
    - /var/lib/vdirsyncer/local_datashare
    - /var/lib/vdirsyncer/local_exchange
    - /var/lib/vdirsyncer/local_icloud_privat
    - /var/lib/vdirsyncer/availability_work
    - /var/lib/vdirsyncer/availability_private

- name: Deploy vdirsyncer config
  no_log: true
  ansible.builtin.template:
    src: config.j2
    dest: /var/lib/vdirsyncer/.vdirsyncer/config
    owner: vdirsyncer
    group: vdirsyncer
    mode: "0600"
  notify:
    - Run calendar sync

- name: Ensure env dir exists
  ansible.builtin.file:
    path: /etc/vdirsyncer
    state: directory
    owner: vdirsyncer
    group: vdirsyncer
    mode: "0750"

- name: Deploy vdirsyncer environment file
  no_log: true
  ansible.builtin.template:
    src: env.j2
    dest: /etc/vdirsyncer/env
    owner: vdirsyncer
    group: vdirsyncer
    mode: "0600"
  notify:
    - Run calendar sync

- name: Deploy anonymize and merge script
  ansible.builtin.template:
    src: anonymize_and_merge.sh.j2
    dest: /usr/local/bin/anonymize_and_merge.sh
    owner: root
    group: root
    mode: "0755"
  notify:
    - Run calendar sync

- name: Deploy systemd service unit
  ansible.builtin.template:
    src: vdirsyncer-clean-sync.service.j2
    dest: /etc/systemd/system/vdirsyncer-clean-sync.service
    mode: "0644"
  notify:
    - Reload systemd daemon

- name: Deploy systemd timer unit
  ansible.builtin.template:
    src: vdirsyncer-clean-sync.timer.j2
    dest: /etc/systemd/system/vdirsyncer-clean-sync.timer
    mode: "0644"
  notify:
    - Reload systemd daemon
    - Enable and start calendar sync timer
    - Run calendar sync
