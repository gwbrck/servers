---
- name: Ensure AdGuardHome directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: true
  loop:
    - "{{ adguardhome_compose_dir }}"
    - "{{ adguardhome_data_dir }}"

- name: Deploy AdGuardHome Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: "{{ adguardhome_compose_dir }}/{{ adguardhome_compose_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Ensure resolved drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Deactivate systemd-resolved DNS stub listener
  ansible.builtin.template:
    src: resolved-dropin.conf.j2
    dest: /etc/systemd/resolved.conf.d/99-adguardhome.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Restart systemd-resolved

- name: Pull images
  community.docker.docker_compose_v2_pull:
    project_src: "{{ adguardhome_compose_dir }}"

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Create and start services
  community.docker.docker_compose_v2:
    project_src: "{{ adguardhome_compose_dir }}"
  register: adguardhome_output

- name: Show results
  ansible.builtin.debug:
    var: adguardhome_output
    verbosity: 1
