---
- name: Ensure Uptime Kuma directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: true
  loop:
    - "{{ uptime_kuma_compose_dir }}"
    - "{{ uptime_kuma_data_dir }}"

- name: Deploy Uptime Kuma Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: "{{ uptime_kuma_compose_dir }}/{{ uptime_kuma_compose_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Pull images
  community.docker.docker_compose_v2_pull:
    project_src: "{{ uptime_kuma_compose_dir }}"

- name: Create and start services
  community.docker.docker_compose_v2:
    project_src: "{{ uptime_kuma_compose_dir }}"
  register: uptime_kuma_output

- name: Show results
  ansible.builtin.debug:
    var: uptime_kuma_output
    verbosity: 1
